<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
    <meta name="theme-color" content="#e2e8f0" />
    <title>Рязанский квест</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://mapgl.2gis.com/api/js/v1"></script>
    <script src="/vendor/zxing-browser.min.js"></script>
    <script src="/scripts/qrScanner.js"></script>
    <style>
      :root {
        --glass-bg: rgba(255, 255, 255, 0.52);
        --glass-strong: rgba(255, 255, 255, 0.72);
        --glass-border: rgba(255, 255, 255, 0.38);
        --glass-blur: blur(18px) saturate(155%);
        --shadow-soft: 0 8px 32px rgba(31, 56, 88, 0.09);
        --shadow-float: 0 20px 50px rgba(30, 58, 95, 0.12);
        --text: #1e293b;
        --muted: #64748b;
        --accent-grad: linear-gradient(165deg, #5a7186 0%, #3d5368 100%);
      }
      * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      body.app {
        color: var(--text);
        min-height: 100vh;
        letter-spacing: -0.02em;
      }
      body.app::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -2;
        background: linear-gradient(168deg, #f8fafc 0%, #e0f2fe 38%, #dbeafe 72%, #e2e8f0 100%);
      }
      body.app::after {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -1;
        background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920&q=85') center/cover no-repeat;
        opacity: 0.2;
        pointer-events: none;
      }
      .glass-panel {
        background: var(--glass-bg);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow-soft);
      }
      .glass-panel-strong {
        background: var(--glass-strong);
        backdrop-filter: var(--glass-blur);
        -webkit-backdrop-filter: var(--glass-blur);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow-float);
      }
      .rounded-card { border-radius: 26px; }
      .rounded-pill { border-radius: 9999px; }
      .hero-radius { border-radius: 32px; }
      .btn-primary {
        padding: 14px 28px;
        border-radius: 9999px;
        background: var(--accent-grad);
        color: #fff;
        font-weight: 500;
        font-size: 15px;
        border: none;
        box-shadow: 0 6px 24px rgba(61, 83, 104, 0.28);
        transition: transform 0.18s ease, box-shadow 0.18s ease;
      }
      .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(61, 83, 104, 0.32); }
      .btn-primary:active { transform: translateY(0); }
      .btn-ghost {
        padding: 12px 22px;
        border-radius: 9999px;
        background: rgba(255,255,255,0.55);
        border: 1px solid var(--glass-border);
        color: #334155;
        font-weight: 500;
        font-size: 14px;
        transition: background 0.15s ease;
      }
      .btn-ghost:hover { background: rgba(255,255,255,0.78); }
      .input-glass {
        width: 100%;
        padding: 14px 18px;
        border-radius: 20px;
        border: 1px solid rgba(255,255,255,0.55);
        background: rgba(255,255,255,0.55);
        backdrop-filter: blur(10px);
        font-size: 15px;
      }
      .input-glass::placeholder {
        color: #94a3b8;
        font-weight: 400;
      }
      .chip {
        padding: 9px 18px;
        border-radius: 9999px;
        font-size: 13px;
        font-weight: 500;
        background: rgba(255,255,255,0.5);
        border: 1px solid var(--glass-border);
        color: var(--muted);
        transition: background 0.15s ease;
      }
      .chip:hover { background: rgba(255,255,255,0.75); }
      .map {
        height: clamp(300px, 48vh, 480px);
        width: 100%;
        border-radius: 24px;
        overflow: hidden;
      }
      .hero-title {
        font-weight: 600;
        letter-spacing: -0.035em;
        line-height: 1.15;
      }
      .main-pad { padding-bottom: 5.5rem; }
      @media (min-width: 1024px) {
        .main-pad { padding-bottom: 2rem; }
      }
      .toast-glass {
        backdrop-filter: blur(16px) saturate(150%);
        -webkit-backdrop-filter: blur(16px) saturate(150%);
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow-soft);
      }
    </style>
  </head>
  <body class="app">
    <header class="sticky top-0 z-40 px-3 pt-3 pb-1">
      <div class="max-w-6xl mx-auto glass-panel rounded-pill px-5 py-3 flex items-center justify-between gap-3">
        <a href="#/" class="hero-title text-lg text-slate-800 no-underline">Рязанский квест</a>
        <nav class="text-sm flex flex-wrap gap-x-4 gap-y-1 items-center justify-end text-slate-600">
          <a class="hover:text-slate-900 transition-colors no-underline" href="#/">Главная</a>
          <button type="button" class="hover:text-slate-900 transition-colors bg-transparent border-0 cursor-pointer p-0 font-inherit text-sm text-slate-600" data-wip="Подбор рядом">Рядом</button>
          <a class="hover:text-slate-900 transition-colors no-underline hidden" href="#/guide" id="navGuide">Кабинет экскурсовода</a>
          <a class="hover:text-slate-900 transition-colors no-underline" href="#/profile">Профиль</a>
          <a class="hover:text-slate-900 transition-colors no-underline" href="#/login" id="navLogin">Вход</a>
          <button type="button" class="hover:text-slate-900 transition-colors hidden bg-transparent border-0 cursor-pointer p-0 font-inherit text-sm text-slate-600" id="navLogout">Выход</button>
        </nav>
      </div>
    </header>

    <main id="app" class="max-w-6xl mx-auto px-3 py-4 main-pad"></main>

    <nav class="lg:hidden fixed bottom-0 left-0 right-0 z-50 flex justify-center pointer-events-none pb-safe">
      <div class="pointer-events-auto glass-panel-strong rounded-pill mx-3 mb-4 flex justify-around items-center gap-1 px-2 py-2.5 w-full max-w-md shadow-lg">
        <a href="#/" class="flex flex-col items-center gap-0.5 text-[11px] text-slate-600 no-underline min-w-[3.5rem] py-1 rounded-pill hover:bg-white/40 transition-colors">
          <span class="text-base leading-none opacity-80">⌂</span>
          <span>Главная</span>
        </a>
        <button type="button" data-wip="Мои маршруты" class="flex flex-col items-center gap-0.5 text-[11px] text-slate-600 min-w-[3.5rem] py-1 rounded-pill hover:bg-white/40 transition-colors bg-transparent border-0 cursor-pointer font-inherit">
          <span class="text-base leading-none opacity-80">◇</span>
          <span>Маршруты</span>
        </button>
        <button type="button" data-wip="Избранное" class="flex flex-col items-center gap-0.5 text-[11px] text-slate-600 min-w-[3.5rem] py-1 rounded-pill hover:bg-white/40 transition-colors bg-transparent border-0 cursor-pointer font-inherit">
          <span class="text-base leading-none opacity-80">♡</span>
          <span>Избранное</span>
        </button>
        <a href="#/guide" id="mobileGuideNav" class="hidden flex flex-col items-center gap-0.5 text-[11px] text-slate-600 no-underline min-w-[3.5rem] py-1 rounded-pill hover:bg-white/40 transition-colors">
          <span class="text-base leading-none opacity-80">◉</span>
          <span>Гид</span>
        </a>
        <a href="#/profile" class="flex flex-col items-center gap-0.5 text-[11px] text-slate-600 no-underline min-w-[3.5rem] py-1 rounded-pill hover:bg-white/40 transition-colors">
          <span class="text-base leading-none opacity-80">◐</span>
          <span>Профиль</span>
        </a>
      </div>
    </nav>

    <div id="dlg" class="fixed inset-0 hidden items-center justify-center p-4 z-[60] bg-slate-900/35 backdrop-blur-sm">
      <div class="glass-panel-strong rounded-card w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto">
        <div class="flex items-center justify-between gap-2">
          <div class="hero-title text-lg text-slate-800" id="dlgTitle">Окно</div>
          <button type="button" class="btn-ghost text-sm !py-2 !px-4" id="dlgClose">Закрыть</button>
        </div>
        <div class="mt-4 space-y-3 text-slate-600" id="dlgBody"></div>
      </div>
    </div>

    <script>
      let cfg = { twogisKey: '' };
      const api = {
        async get(path) {
          const token = localStorage.getItem('token');
          const res = await fetch(path, { headers: token ? { 'x-auth-token': token } : {} });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw data;
          return data;
        },
        async post(path, body) {
          const token = localStorage.getItem('token');
          const res = await fetch(path, {
            method: 'POST',
            headers: Object.assign({ 'Content-Type': 'application/json' }, token ? { 'x-auth-token': token } : {}),
            body: JSON.stringify(body || {})
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw data;
          return data;
        }
      };

      const state = {
        user: null,
        routes: [],
        points: [],
        stops: [],
        selectedRoute: null,
        map: null,
        polyline: null,
        markers: [],
        userMarker: null,
        watchId: null,
        routeStats: { meters: 0, seconds: 0, source: '' },
        placedStops: [],
        qr: {
          scanner: null,
          cameraMode: 'environment',
          cameraOpen: false,
          cameraStarting: false,
          uploadBusy: false,
          submitting: false,
          syncing: false,
          status: '',
          error: '',
          render: null
        },
        guide: {
          packs: [],
          details: {},
          selectedPackId: '',
          selectedVariantRouteId: '',
          loadingList: false,
          loadingDetail: false,
          error: '',
          map: null,
          markers: [],
          polyline: null
        }
      };

      const legacyScanQueueKey = 'offline_scan_queue';
      const scanQueueKey = 'offline_scan_queue_v2';
      let scanQueueSyncPromise = null;

      const parseStoredJson = (value, fallback) => {
        try { return JSON.parse(value); } catch (e) { return fallback; }
      };

      const normalizeClientQrValue = (value) => String(value || '').trim().replace(/\s+/g, '').toLowerCase();

      const migrateLegacyScanQueue = () => {
        const legacy = parseStoredJson(localStorage.getItem(legacyScanQueueKey) || '[]', []);
        if (!Array.isArray(legacy) || !legacy.length) return [];
        const migrated = legacy.map((item) => ({
          id: item.id || crypto.randomUUID(),
          qrValue: String(item.qrValue || ''),
          normalizedQrValue: normalizeClientQrValue(item.qrValue),
          source: item.source || 'legacy-manual',
          createdAt: item.ts || Date.now()
        }));
        localStorage.removeItem(legacyScanQueueKey);
        return migrated;
      };

      const dedupeQueuedScans = (items) => {
        const seen = new Set();
        return (Array.isArray(items) ? items : []).filter((item) => {
          const normalizedQrValue = normalizeClientQrValue(item.normalizedQrValue || item.qrValue);
          if (!normalizedQrValue || seen.has(normalizedQrValue)) return false;
          seen.add(normalizedQrValue);
          item.normalizedQrValue = normalizedQrValue;
          return true;
        });
      };

      const readQueuedScans = () => {
        const current = parseStoredJson(localStorage.getItem(scanQueueKey) || '[]', []);
        if (Array.isArray(current) && current.length) return dedupeQueuedScans(current);
        const migrated = migrateLegacyScanQueue();
        if (migrated.length) {
          localStorage.setItem(scanQueueKey, JSON.stringify(dedupeQueuedScans(migrated)));
        }
        return dedupeQueuedScans(migrated);
      };

      const writeQueuedScans = (items) => {
        const normalized = dedupeQueuedScans(items);
        localStorage.setItem(scanQueueKey, JSON.stringify(normalized));
        return normalized;
      };

      const getQueuedScanCount = () => readQueuedScans().length;

      const enqueueScan = (qrValue, source) => {
        const normalizedQrValue = normalizeClientQrValue(qrValue);
        if (!normalizedQrValue) return { added: false, duplicate: false, count: getQueuedScanCount() };

        const queue = readQueuedScans();
        if (queue.some((item) => item.normalizedQrValue === normalizedQrValue)) {
          return { added: false, duplicate: true, count: queue.length };
        }

        const nextQueue = writeQueuedScans([
          ...queue,
          {
            id: crypto.randomUUID(),
            qrValue: String(qrValue || '').trim(),
            normalizedQrValue,
            source: source || 'manual',
            createdAt: Date.now()
          }
        ]);

        return { added: true, duplicate: false, count: nextQueue.length };
      };

      const removeQueuedScan = (id) => {
        writeQueuedScans(readQueuedScans().filter((item) => item.id !== id));
      };

      const el = (html) => {
        const t = document.createElement('template');
        t.innerHTML = html.trim();
        return t.content.firstElementChild;
      };

      const escapeHtml = (value) =>
        String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');

      const hasGuideWorkspaceAccess = (user = state.user) => ['Guide', 'Curator', 'Administrator'].includes(String(user?.role || ''));

      const toast = (msg, type='info') => {
        let cls = 'text-slate-800 bg-white/82';
        if (type === 'error') cls = 'text-rose-900 bg-rose-50/90';
        if (type === 'success') cls = 'text-emerald-900 bg-emerald-50/90';
        const box = el(`<div class="fixed bottom-24 lg:bottom-5 right-4 z-[55] px-5 py-3.5 rounded-pill text-sm font-medium toast-glass ${cls}">${msg}</div>`);
        document.body.appendChild(box);
        setTimeout(() => box.remove(), 2800);
      };

      function triggerQrRender() {
        if (typeof state.qr.render === 'function') state.qr.render();
      }

      async function stopActiveScanner(options = {}) {
        const { preserveStatus = false } = options;
        const scanner = state.qr.scanner;
        if (scanner && typeof scanner.stop === 'function') {
          try {
            await scanner.stop();
          } catch (error) {
            console.warn('Failed to stop active scanner', error);
          }
        }

        state.qr.cameraOpen = false;
        state.qr.cameraStarting = false;
        if (!preserveStatus) state.qr.error = '';
        triggerQrRender();
      }

      function showWip(name) {
        const label = name || 'Этот раздел';
        dlg.open('В разработке', [
          el(`<p class="text-sm leading-relaxed text-slate-600">${label} находится в разработке. Скоро здесь появится полный функционал.</p>`),
          el('<button type="button" class="btn-primary w-full text-center" id="wipOk">Понятно</button>')
        ]);
        document.getElementById('wipOk').onclick = () => dlg.close();
      }
      document.addEventListener('click', (e) => {
        const t = e.target.closest('[data-wip]');
        if (!t) return;
        e.preventDefault();
        e.stopPropagation();
        showWip(t.getAttribute('data-wip') || '');
      });

      const dlg = {
        open(title, nodes) {
          document.getElementById('dlgTitle').textContent = title;
          const b = document.getElementById('dlgBody');
          b.innerHTML = '';
          nodes.forEach(n => b.appendChild(n));
          const m = document.getElementById('dlg');
          m.classList.remove('hidden');
          m.classList.add('flex');
        },
        close() {
          const m = document.getElementById('dlg');
          m.classList.add('hidden');
          m.classList.remove('flex');
        }
      };
      document.getElementById('dlgClose').addEventListener('click', dlg.close);
      document.getElementById('dlg').addEventListener('click', (e) => { if (e.target.id === 'dlg') dlg.close(); });

      async function loadConfig() {
        try { cfg = await api.get('/api/config'); } catch (e) { cfg = { twogisKey: '' }; }
      }

      const setNavAuth = () => {
        const login = document.getElementById('navLogin');
        const logout = document.getElementById('navLogout');
        const guideLink = document.getElementById('navGuide');
        const mobileGuideLink = document.getElementById('mobileGuideNav');
        if (localStorage.getItem('token')) {
          login.classList.add('hidden');
          logout.classList.remove('hidden');
        } else {
          login.classList.remove('hidden');
          logout.classList.add('hidden');
        }

        const guideVisible = Boolean(localStorage.getItem('token')) && hasGuideWorkspaceAccess();
        guideLink.classList.toggle('hidden', !guideVisible);
        mobileGuideLink.classList.toggle('hidden', !guideVisible);
      };

      document.getElementById('navLogout').addEventListener('click', () => {
        localStorage.removeItem('token');
        state.user = null;
        state.guide.selectedPackId = '';
        state.guide.selectedVariantRouteId = '';
        destroyGuideMap();
        setNavAuth();
        location.hash = '#/login';
        toast('Вы вышли', 'success');
      });

      async function fetchUser() {
        try { state.user = await api.get('/api/users/me'); } catch (e) {
          state.user = null;
          localStorage.removeItem('token');
        }
        setNavAuth();
      }

      async function loadCoreData() {
        try {
          const [points, routes, stops] = await Promise.all([
            api.get('/api/points'),
            api.get('/api/routes'),
            api.get('/api/stops')
          ]);
          state.points = points;
          state.routes = routes;
          state.stops = stops;
          localStorage.setItem('offline_points', JSON.stringify(points));
          localStorage.setItem('offline_routes', JSON.stringify(routes));
          localStorage.setItem('offline_stops', JSON.stringify(stops));
        } catch (e) {
          state.points = JSON.parse(localStorage.getItem('offline_points') || '[]');
          state.routes = JSON.parse(localStorage.getItem('offline_routes') || '[]');
          state.stops = JSON.parse(localStorage.getItem('offline_stops') || '[]');
        }
      }

      function sortedRoutePoints(route) {
        return (route?.points || []).slice().sort((a,b) => (a.order||0) - (b.order||0));
      }

      function getScannedPointIds() {
        return (state.user?.scannedPoints || []).map(p => p._id);
      }

      function findRouteByPoint(point) {
        if (!point) return null;
        return (
          state.routes.find((route) => route._id === point.routeId) ||
          state.routes.find((route) => (route.points || []).some((item) => item._id === point._id)) ||
          null
        );
      }

      function getNextRoutePoint(route) {
        if (!route) return null;
        const scannedIds = new Set(getScannedPointIds());
        return sortedRoutePoints(route).find((point) => !scannedIds.has(point._id)) || null;
      }

      async function refreshAfterScanStateChange() {
        await fetchUser();
        if (state.map) {
          drawMarkers();
          await updatePedestrianRoute();
        }
        if (typeof window.__refreshHome === 'function') window.__refreshHome();
      }

      async function applyScanResponse(res, options = {}) {
        const point = res.point;
        const route = findRouteByPoint(point);
        const switchedRoute = Boolean(
          route &&
          options.allowRouteSwitch !== false &&
          (!state.selectedRoute || state.selectedRoute._id !== route._id)
        );

        if (switchedRoute) {
          state.selectedRoute = route;
          state.placedStops = [];
        }

        await refreshAfterScanStateChange();

        if (res.scanStatus === 'fresh') {
          const rewardDelta = res.rewardDelta ?? res.reward ?? 0;
          toast('Точка засчитана, +' + rewardDelta, 'success');
        } else {
          toast('Эта точка уже была засчитана', 'info');
        }

        if (switchedRoute && route) {
          toast('Переключили маршрут: ' + route.name, 'success');
        }

        if (Array.isArray(res.newlyCompletedRoutes) && res.newlyCompletedRoutes.length) {
          toast(
            'Маршрут завершён: ' + res.newlyCompletedRoutes.map((item) => item.name).join(', '),
            'success'
          );
        }

        state.qr.status = res.scanStatus === 'fresh'
          ? 'Новая точка принята.'
          : 'Повторный скан принят без дополнительных баллов.';
        state.qr.error = '';
        triggerQrRender();

        if (point && options.openGuide !== false) {
          openGuideForPoint(point, res.scanStatus === 'fresh');
        }

        return { point, route, switchedRoute };
      }

      async function syncQueuedScans(options = {}) {
        if (scanQueueSyncPromise) return scanQueueSyncPromise;

        scanQueueSyncPromise = (async () => {
          const queue = readQueuedScans();
          if (!navigator.onLine || !queue.length || !localStorage.getItem('token')) {
            triggerQrRender();
            return { fresh: 0, duplicate: 0, failed: 0, remaining: queue.length };
          }

          state.qr.syncing = true;
          state.qr.status = 'Синхронизируем сохранённые QR-коды...';
          state.qr.error = '';
          triggerQrRender();

          const summary = { fresh: 0, duplicate: 0, failed: 0 };

          for (const item of readQueuedScans()) {
            try {
              const res = await api.post('/api/scan', {
                qrValue: item.qrValue,
                source: item.source || 'offline-queue'
              });
              removeQueuedScan(item.id);
              if (res.scanStatus === 'fresh') summary.fresh += 1;
              else summary.duplicate += 1;
            } catch (error) {
              summary.failed += 1;
            }
          }

          if (summary.fresh || summary.duplicate) {
            await refreshAfterScanStateChange();
          }

          if (!options.silent) {
            if (summary.fresh) {
              toast('Синхронизировано новых точек: ' + summary.fresh, 'success');
            } else if (summary.duplicate) {
              toast('Офлайн-очередь синхронизирована без дополнительных баллов', 'info');
            }
          }

          state.qr.status = getQueuedScanCount()
            ? 'Остались сохранённые сканы, повторим позже.'
            : 'Офлайн-очередь пуста.';
          return { ...summary, remaining: getQueuedScanCount() };
        })();

        try {
          return await scanQueueSyncPromise;
        } finally {
          state.qr.syncing = false;
          scanQueueSyncPromise = null;
          triggerQrRender();
        }
      }

      function destroyMapGl() {
        if (state.watchId != null) {
          navigator.geolocation.clearWatch(state.watchId);
          state.watchId = null;
        }
        state.markers.forEach(m => { if (m && m.destroy) m.destroy(); });
        state.markers = [];
        if (state.polyline && state.polyline.destroy) state.polyline.destroy();
        state.polyline = null;
        if (state.userMarker && state.userMarker.destroy) state.userMarker.destroy();
        state.userMarker = null;
        if (state.map && state.map.destroy) state.map.destroy();
        state.map = null;
      }

      function destroyGuideMap() {
        state.guide.markers.forEach((marker) => { if (marker && marker.destroy) marker.destroy(); });
        state.guide.markers = [];
        if (state.guide.polyline && state.guide.polyline.destroy) state.guide.polyline.destroy();
        state.guide.polyline = null;
        if (state.guide.map && state.guide.map.destroy) state.guide.map.destroy();
        state.guide.map = null;
      }

      function buildWaypointsFromRoute(route) {
        const pts = sortedRoutePoints(route);
        if (!pts.length) return [];
        const wp = [{ lng: pts[0].lng, lat: pts[0].lat, kind: 'poi', ref: pts[0] }];
        for (let i = 0; i < pts.length - 1; i++) {
          const extras = state.placedStops.filter(x => x.afterIndex === i).map(x => x.stop);
          extras.forEach(s => wp.push({ lng: s.lng, lat: s.lat, kind: 'stop', ref: s }));
          wp.push({ lng: pts[i+1].lng, lat: pts[i+1].lat, kind: 'poi', ref: pts[i+1] });
        }
        return wp;
      }

      async function updatePedestrianRoute() {
        if (!state.map || !state.selectedRoute) return;
        const w = buildWaypointsFromRoute(state.selectedRoute);
        const seq = w.map(p => ({ lng: p.lng, lat: p.lat }));
        let data = { coordinates: [], total_distance_m: 0, total_duration_s: 0, source: '', error: null };
        try {
          if (seq.length >= 2) data = await api.post('/api/routing/pedestrian', { waypoints: seq });
        } catch (e) {
          data = { coordinates: seq.map(p => [p.lng, p.lat]), total_distance_m: 0, total_duration_s: 0, source: 'local', error: e };
        }
        state.routeStats = {
          meters: data.total_distance_m || 0,
          seconds: data.total_duration_s || 0,
          source: data.source || ''
        };
        const coords = data.coordinates || [];
        if (state.polyline) { state.polyline.destroy(); state.polyline = null; }
        if (coords.length >= 2 && window.mapgl && mapgl.Polyline) {
          try {
            state.polyline = new mapgl.Polyline(state.map, {
              coordinates: coords,
              color: '#5a7d92',
              width: 5
            });
          } catch (e) {
            console.warn('Polyline', e);
          }
        }
        const statEl = document.getElementById('routeStats');
        if (statEl) {
          const km = (state.routeStats.meters / 1000).toFixed(2);
          const min = Math.round(state.routeStats.seconds / 60);
          statEl.textContent = `Ориентир: ${km} км пешком, ~${min} мин (данные 2ГИС). Источник: ${state.routeStats.source || '—'}${data.error ? ', резерв' : ''}`;
        }
      }

      function drawMarkers() {
        state.markers.forEach(m => { if (m && m.destroy) m.destroy(); });
        state.markers = [];
        if (!state.map || !state.selectedRoute) return;
        const scanned = new Set(getScannedPointIds());
        sortedRoutePoints(state.selectedRoute).forEach((p) => {
          const isDone = scanned.has(p._id);
          const color = isDone ? '#16a34a' : '#dc2626';
          const html = `<button type="button" style="width:16px;height:16px;border-radius:9999px;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.35);cursor:pointer;padding:0" data-p="${p._id}" class="rq-m"></button>`;
          const marker = new mapgl.HtmlMarker(state.map, { coordinates: [p.lng, p.lat], html });
          state.markers.push(marker);
        });
        state.placedStops.forEach((ps) => {
          const s = ps.stop;
          const sid = (s._id || '').replace(/"/g, '');
          const html = `<button type="button" class="rq-s" data-sn="${sid}" style="padding:2px 6px;font-size:10px;border-radius:6px;background:#7c3aed;color:#fff;border:0;cursor:pointer">${(s.name || '').slice(0, 14)}</button>`;

      async function handleScanResult(qr, options = {}) {
        const value = String(qr || '').trim();
        if (!value) {
          toast('Введите значение QR', 'error');
          return { queued: false, result: null };
        }

        try {
          state.qr.submitting = true;
          state.qr.error = '';
          state.qr.status = navigator.onLine
            ? 'Проверяем QR-код...'
            : 'Сохраняем QR-код в офлайн-очередь...';
          triggerQrRender();

          if (!navigator.onLine) {
            const queued = enqueueScan(value, options.source || 'manual');
            if (queued.duplicate) {
              toast('Этот QR уже ждёт синхронизации', 'info');
            } else {
              toast('Сохранено офлайн. Синхронизируем позже.', 'success');
            }
            state.qr.submitting = false;
            state.qr.status = queued.count ? 'В офлайн-очереди: ' + queued.count : 'Офлайн-очередь пуста.';
            triggerQrRender();
            return { queued: true, result: null };
          }

          const res = await api.post('/api/scan', {
            qrValue: value,
            source: options.source || 'manual'
          });
          await applyScanResponse(res, {
            allowRouteSwitch: options.allowRouteSwitch,
            openGuide: options.openGuide
          });
          state.qr.submitting = false;
          triggerQrRender();
          return { queued: false, result: res };
        } catch (e) {
          state.qr.submitting = false;
          state.qr.error = e.msg || 'Не удалось обработать QR-код';
          state.qr.status = '';
          triggerQrRender();
          toast(e.msg || 'Сканирование не удалось', 'error');
          return { queued: false, result: null };
        }
      }

        const getQrCapabilities = () =>

        const describeCameraIssue = (error) => {
          const capabilities = getQrCapabilities();
          const errorName = String(error?.name || '').toLowerCase();
          const errorMessage = String(error?.message || error || '').toLowerCase();

          if (!capabilities.decoderAvailable) return 'QR-сканер не загрузился. Пока можно использовать фото или ручной ввод.';
          if (!capabilities.secureContext) return 'Сканирование камерой требует HTTPS или localhost. Пока используйте фото или ручной ввод.';
          if (!capabilities.mediaDevices) return 'Этот браузер не умеет открывать камеру. Используйте фото или ручной ввод.';
          if (errorName.includes('notallowed') || errorMessage.includes('permission') || errorMessage.includes('denied')) {
            return 'Доступ к камере заблокирован. Разрешите его в браузере или используйте фото.';
          }
          if (errorName.includes('notfound') || errorMessage.includes('not found')) {
            return 'Камера не найдена. Используйте фото или ручной ввод.';
          }
          if (errorName.includes('notreadable') || errorMessage.includes('notreadable')) {
            return 'Камера занята другим приложением. Закройте его и попробуйте снова.';
          }
          if (errorName.includes('overconstrained') || errorMessage.includes('constraint')) {

        state.guide.loadingDetail = true;
        try {
          const detail = await api.get(`/api/route-packs/guide/${packId}`);
          state.guide.details[packId] = detail;
          state.guide.error = '';
          return detail;
        } catch (error) {
          state.guide.error = error.msg || 'Не удалось открыть briefing сценария.';
          delete state.guide.details[packId];
          throw error;
        } finally {
          state.guide.loadingDetail = false;
        }
      }

      function renderGuideMaterialBlocks(stop) {
        const wrap = document.createElement('div');
        wrap.className = 'space-y-3';
        const blocks = Array.isArray(stop.materialBlocks) ? stop.materialBlocks : [];

        if (!blocks.length) {
          wrap.appendChild(el('<div class="glass-panel rounded-card p-4 text-sm text-slate-500 font-light">Материалов для этой остановки пока нет.</div>'));
          return wrap;
        }

        blocks.forEach((block) => {
          if (block.type === 'guideText') {
            wrap.appendChild(el(`
              <div class="glass-panel rounded-card p-4 space-y-2">
                <div class="text-[11px] uppercase tracking-[0.16em] text-slate-400 font-semibold">Текст экскурсовода</div>
                <div class="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed">${escapeHtml(block.text)}</div>
              </div>
            `));
            return;
          }

          if (block.type === 'audio') {
            wrap.appendChild(el(`
              <div class="glass-panel rounded-card p-4 space-y-2">
                <div class="text-[11px] uppercase tracking-[0.16em] text-slate-400 font-semibold">Аудио</div>
                <audio controls class="w-full" src="${escapeHtml(block.url)}">Ваш браузер не поддерживает audio</audio>
              </div>
            `));
            return;
          }

          if (block.type === 'facts') {
            const facts = Array.isArray(block.items) ? block.items : [];
            wrap.appendChild(el(`
              <div class="glass-panel rounded-card p-4 space-y-3">
                <div class="text-[11px] uppercase tracking-[0.16em] text-slate-400 font-semibold">Опорные факты</div>
                <div class="space-y-3">
                  ${facts
                    .map(
                      (fact) => `
                        <div class="rounded-card bg-white/70 border border-white/60 px-3 py-3 space-y-1">
                          <div class="text-sm font-medium text-slate-800">${escapeHtml(fact.question || 'Факт')}</div>
                          <div class="text-sm text-slate-600 leading-relaxed">${escapeHtml(fact.answer || '')}</div>
                        </div>
                      `
                    )
                    .join('')}
                </div>
              </div>
            `));
            return;
          }

          if (block.type === 'description') {
            wrap.appendChild(el(`
              <div class="glass-panel rounded-card p-4 space-y-2">
                <div class="text-[11px] uppercase tracking-[0.16em] text-slate-400 font-semibold">Описание точки</div>
                <div class="text-sm text-slate-700 leading-relaxed">${escapeHtml(block.text)}</div>
              </div>
            `));
          }
        });

        return wrap;
      }

      function renderGuideStopCard(stop, index) {
        const card = el(`
          <article class="glass-panel rounded-card p-5 space-y-4">
            <div class="flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="text-[11px] uppercase tracking-[0.18em] text-slate-400 font-semibold">Остановка ${index + 1}</div>
                <h3 class="hero-title text-lg text-slate-800 mt-2">${escapeHtml(stop.name)}</h3>
                <div class="text-sm text-slate-500 font-light mt-1 leading-relaxed">${escapeHtml(stop.address || 'Адрес не указан')}</div>
              </div>
              <div class="flex flex-col items-end gap-2 shrink-0">
                <span class="px-3 py-1.5 rounded-pill text-[11px] font-semibold ${stop.hasGuideGap ? 'bg-amber-50/95 text-amber-900 border border-amber-100' : 'bg-emerald-50/95 text-emerald-900 border border-emerald-100'}">
                  ${stop.hasGuideGap ? 'Нужен fallback' : 'Готово для гида'}
                </span>
                <span class="text-[11px] font-medium text-slate-500">${escapeHtml(guideMaterialLabel(stop.materialSource))}</span>
              </div>
            </div>
            <div class="text-sm text-slate-600 leading-relaxed">${escapeHtml(stop.previewText || stop.description || '')}</div>
          </article>
        `);

        card.appendChild(renderGuideMaterialBlocks(stop));
        return card;
      }

      function renderGuidePreviewMap(containerEl, statusEl, variant) {
        destroyGuideMap();
        if (!containerEl || !statusEl) return;

        const stops = Array.isArray(variant?.stops) ? variant.stops : [];
        containerEl.innerHTML = '';

        if (!stops.length) {
          statusEl.textContent = 'У этого варианта пока нет остановок для показа на карте.';
          containerEl.appendChild(el('<div class="h-full min-h-[220px] flex items-center justify-center text-sm text-slate-500 bg-slate-100/70 rounded-card">Нет данных для карты</div>'));
          return;
        }

        if (!cfg.twogisKey) {
          statusEl.textContent = 'Карта недоступна: не настроен ключ 2ГИС.';
          containerEl.appendChild(el('<div class="h-full min-h-[220px] flex items-center justify-center text-sm text-slate-500 bg-slate-100/70 rounded-card">Добавьте ключ 2ГИС, чтобы видеть маршрут на карте.</div>'));
          return;
        }

        if (!window.mapgl) {
          statusEl.textContent = 'Загружаем карту…';
          containerEl.appendChild(el('<div class="h-full min-h-[220px] flex items-center justify-center text-sm text-slate-500 bg-slate-100/70 rounded-card">Карта загружается…</div>'));
          setTimeout(() => {
            if (document.body.contains(containerEl)) renderGuidePreviewMap(containerEl, statusEl, variant);
          }, 250);
          return;
        }

        statusEl.textContent = `${variant.pointCount || stops.length} остановок · ${variant.distanceKm || 0} км · ~${variant.durationMinutes || 0} мин`;

        state.guide.map = new mapgl.Map(containerEl, {
          key: cfg.twogisKey,
          center: [variant.previewCenter?.lng || stops[0].lng, variant.previewCenter?.lat || stops[0].lat],
          zoom: 13
        });

        state.guide.markers = stops.map((stop, index) => {
          const html = `<div style="min-width:24px;height:24px;border-radius:9999px;background:#2563eb;color:#fff;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;box-shadow:0 1px 4px rgba(15,23,42,.22)">${index + 1}</div>`;
          return new mapgl.HtmlMarker(state.guide.map, { coordinates: [stop.lng, stop.lat], html });
        });

        if (stops.length >= 2 && window.mapgl?.Polyline) {
          state.guide.polyline = new mapgl.Polyline(state.guide.map, {
            coordinates: stops.map((stop) => [stop.lng, stop.lat]),
            color: '#2563eb',
            width: 4
          });
        }
      }

      async function renderGuideWorkspace() {
        const root = document.getElementById('app');
        root.innerHTML = '';
        destroyMapGl();
        destroyGuideMap();

        if (!localStorage.getItem('token')) {
          location.hash = '#/login';
          return;
        }

        await loadConfig();
        await fetchUser();

        if (!state.user) {
          location.hash = '#/login';
          return;
        }

        if (!hasGuideWorkspaceAccess()) {
          root.appendChild(el(`
            <section class="max-w-2xl mx-auto glass-panel-strong rounded-card p-6 md:p-8 space-y-4 mt-4">
              <div class="text-[11px] uppercase tracking-[0.18em] text-slate-400 font-semibold">Доступ ограничен</div>
              <h1 class="hero-title text-2xl text-slate-800">Кабинет экскурсовода доступен не для всех ролей</h1>
              <p class="text-sm text-slate-600 leading-relaxed">Сейчас этот раздел открыт только для ролей <strong>Guide</strong>, <strong>Curator</strong> и <strong>Administrator</strong>. Если доступ нужен для рабочей смены, попросите администратора назначить роль.</p>
              <div class="flex flex-wrap gap-3">
                <a href="#/" class="btn-primary !no-underline text-sm !py-3 !px-5">Вернуться на главную</a>
                <a href="#/profile" class="btn-ghost !no-underline text-sm !py-3 !px-5">Открыть профиль</a>
              </div>
            </section>
          `));
          return;
        }

        root.appendChild(el('<section class="glass-panel-strong rounded-card p-6 md:p-8 mb-5 space-y-3"><div class="text-[11px] uppercase tracking-[0.18em] text-slate-400 font-semibold">Кабинет экскурсовода</div><div class="hero-title text-2xl md:text-3xl text-slate-800">Подберите готовый сценарий и откройте briefing маршрута</div><div class="text-sm text-slate-600 leading-relaxed">Сначала выберите pack с обещанием и практическими заметками, затем переключайтесь между вариантами маршрута прямо внутри одного live-briefing.</div></section>'));

        try {
          await loadGuidePacks();
        } catch (error) {
          root.appendChild(el(`
            <section class="glass-panel rounded-card p-6 space-y-3">
              <div class="hero-title text-xl text-slate-800">Не удалось открыть сценарии</div>
              <div class="text-sm text-slate-600 leading-relaxed">${escapeHtml(state.guide.error || error.msg || 'Попробуйте обновить страницу чуть позже.')}</div>
            </section>
          `));
          return;
        }

        if (!state.guide.packs.length) {
          root.appendChild(el(`
            <section class="glass-panel rounded-card p-6 space-y-3">
              <div class="hero-title text-xl text-slate-800">Пока нет доступных сценариев</div>
              <div class="text-sm text-slate-600 leading-relaxed">Здесь появятся только опубликованные и валидные pack-сценарии, готовые к живой экскурсии.</div>
            </section>
          `));
          return;
        }

        if (state.guide.selectedPackId && !state.guide.details[state.guide.selectedPackId]) {
          try {
            await loadGuidePackDetail(state.guide.selectedPackId);
          } catch (error) {
            toast(error.msg || 'Не удалось открыть сценарий', 'error');
            state.guide.selectedPackId = '';
            state.guide.selectedVariantRouteId = '';
          }
        }

        const selectedPack = getSelectedGuidePack();
        const selectedVariant = getSelectedGuideVariant(selectedPack);

        if (selectedPack && !selectedVariant) {
          state.guide.selectedVariantRouteId = '';
        }

        const layout = el(`<div class="${selectedPack ? 'grid grid-cols-1 xl:grid-cols-[340px,minmax(0,1fr)] gap-5' : 'space-y-5'}"></div>`);
        const listSection = el(`
          <section class="glass-panel rounded-card p-5 space-y-4 ${selectedPack ? 'hidden xl:block xl:sticky xl:top-24 xl:self-start' : ''}">
            <div class="flex items-start justify-between gap-3">
              <div>
                <div class="text-[11px] uppercase tracking-[0.16em] text-slate-400 font-semibold">Сценарии</div>
                <h2 class="hero-title text-xl text-slate-800 mt-1">Готовые pack-маршруты</h2>
              </div>
              <div class="text-xs font-medium text-slate-500">${state.guide.packs.length} шт.</div>
            </div>
            <div class="space-y-3" id="guidePackList"></div>
          </section>
        `);

        const listNode = listSection.querySelector('#guidePackList');
        state.guide.packs.forEach((pack) => {
          const isActive = pack._id === state.guide.selectedPackId;
          const card = el(`
            <article class="rounded-card border ${isActive ? 'border-cyan-300 bg-white/80 shadow-sm' : 'border-white/60 bg-white/55'} p-4 space-y-3 transition-colors">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <div class="hero-title text-lg text-slate-800">${escapeHtml(pack.name)}</div>
                  <div class="text-sm text-slate-500 font-light mt-1 leading-relaxed">${escapeHtml(pack.promise || pack.description || '')}</div>
                </div>
                ${pack.featured ? '<span class="px-3 py-1 rounded-pill text-[11px] font-semibold bg-cyan-50/95 text-cyan-900 border border-cyan-100">Featured</span>' : ''}
              </div>
              <div class="text-sm text-slate-600 leading-relaxed">${escapeHtml(pack.description || '')}</div>
              ${pack.practicalNotesTeaser ? `<div class="text-xs text-slate-500 leading-relaxed">Практика: ${escapeHtml(pack.practicalNotesTeaser)}</div>` : ''}
              <div class="space-y-2">
                ${pack.variants
                  .map(
                    (variant) => `
                      <div class="rounded-card bg-white/70 border border-white/60 px-3 py-2.5">
                        <div class="text-sm font-medium text-slate-800">${escapeHtml(variant.name)}</div>
                        <div class="text-xs text-slate-500 mt-1">${guideVariantRoleLabel(variant.role)} · ${variant.pointCount} остановок · ~${variant.durationMinutes} мин</div>
                      </div>
                    `
                  )
                  .join('')}
              </div>
              <button type="button" class="btn-primary w-full text-sm !py-3">${isActive ? 'Открыт сейчас' : 'Открыть briefing'}</button>
            </article>
          `);

          card.querySelector('button').onclick = async () => {
            try {
              state.guide.selectedPackId = pack._id;
              const detail = await loadGuidePackDetail(pack._id);
              state.guide.selectedVariantRouteId = detail.defaultVariantRouteId || detail.variants?.[0]?.routeId || '';
              await renderGuideWorkspace();
              window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (error) {
              toast(error.msg || 'Не удалось открыть сценарий', 'error');
            }
          };

          listNode.appendChild(card);
        });

        layout.appendChild(listSection);

        if (!selectedPack) {
          layout.appendChild(el(`
            <section class="glass-panel rounded-card p-6 md:p-8 space-y-4">
              <div class="text-[11px] uppercase tracking-[0.18em] text-slate-400 font-semibold">Briefing</div>
              <h2 class="hero-title text-2xl text-slate-800">Выберите сценарий из списка</h2>
              <div class="text-sm text-slate-600 leading-relaxed">После выбора откроется briefing с обещанием pack-сценария, практическими заметками, переключателем вариантов и карточками остановок в порядке экскурсии.</div>
            </section>
          `));
          root.appendChild(layout);
          return;
        }

        if (!state.guide.selectedVariantRouteId) {
          state.guide.selectedVariantRouteId = selectedPack.defaultVariantRouteId || selectedPack.variants?.[0]?.routeId || '';
        }

        const activeVariant = getSelectedGuideVariant(selectedPack);
        const detailSection = el(`
          <section class="space-y-5">
            <div class="glass-panel rounded-card p-5 md:p-6 space-y-4">
              <button type="button" class="btn-ghost text-sm !py-2.5 !px-4 xl:hidden" id="guideBack">К списку сценариев</button>
              <div class="flex flex-wrap items-start justify-between gap-3">
                <div class="min-w-0">
                  <div class="text-[11px] uppercase tracking-[0.18em] text-slate-400 font-semibold">Briefing pack</div>
                  <h2 class="hero-title text-2xl md:text-3xl text-slate-800 mt-2">${escapeHtml(selectedPack.name)}</h2>
                  <div class="text-sm text-slate-500 font-light mt-3 leading-relaxed">${escapeHtml(selectedPack.promise || '')}</div>
                </div>
                <div class="flex flex-wrap gap-2">
                  ${(selectedPack.badges || []).map((badge) => `<span class="px-3 py-1.5 rounded-pill text-[11px] font-semibold bg-white/75 border border-white/70 text-slate-700">${escapeHtml(badge)}</span>`).join('')}
                </div>
              </div>
              <div class="text-sm text-slate-600 leading-relaxed">${escapeHtml(selectedPack.description || '')}</div>
              ${selectedPack.practicalNotes ? `<div class="glass-panel rounded-card p-4"><div class="text-[11px] uppercase tracking-[0.16em] text-slate-400 font-semibold">Практические заметки</div><div class="text-sm text-slate-700 leading-relaxed mt-2">${escapeHtml(selectedPack.practicalNotes)}</div></div>` : ''}
            </div>

            <div class="glass-panel rounded-card p-5 space-y-4">
              <div class="flex items-center justify-between gap-3 flex-wrap">
                <div>
                  <div class="text-[11px] uppercase tracking-[0.16em] text-slate-400 font-semibold">Варианты маршрута</div>
                  <h3 class="hero-title text-xl text-slate-800 mt-1">Переключайтесь внутри одного сценария</h3>
                </div>
                <div class="text-xs text-slate-500">${selectedPack.variants.length} вариант(а)</div>
              </div>
              <div class="grid grid-cols-1 lg:grid-cols-2 gap-3" id="guideVariantList"></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-[minmax(0,1.2fr),minmax(0,0.8fr)] gap-5">
              <section class="glass-panel rounded-card p-5 space-y-4">
                <div class="flex items-center justify-between gap-3 flex-wrap">
                  <div>
                    <div class="text-[11px] uppercase tracking-[0.16em] text-slate-400 font-semibold">Контекст маршрута</div>
                    <h3 class="hero-title text-xl text-slate-800 mt-1">${escapeHtml(activeVariant?.name || '')}</h3>
                  </div>
                  <div class="text-xs text-slate-500">${guideVariantRoleLabel(activeVariant?.role)}</div>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                  <div class="glass-panel rounded-card p-3 text-slate-600">Остановок <div class="font-semibold text-slate-800 mt-1">${activeVariant?.pointCount || 0}</div></div>
                  <div class="glass-panel rounded-card p-3 text-slate-600">Длина <div class="font-semibold text-slate-800 mt-1">${activeVariant?.distanceKm || 0} км</div></div>
                  <div class="glass-panel rounded-card p-3 text-slate-600">Время <div class="font-semibold text-slate-800 mt-1">~${activeVariant?.durationMinutes || 0} мин</div></div>
                  <div class="glass-panel rounded-card p-3 text-slate-600">Fallback <div class="font-semibold text-slate-800 mt-1">${activeVariant?.fallbackStopCount || 0}</div></div>
                </div>
                <div class="text-sm text-slate-600 leading-relaxed">${escapeHtml(activeVariant?.reason || '')}</div>
                <div class="text-xs text-slate-500" id="guideMapStatus">Готовим карту…</div>
                <div class="glass-panel rounded-card p-1 overflow-hidden">
                  <div id="guideMap" class="h-64 rounded-card overflow-hidden"></div>
                </div>
              </section>

              <section class="glass-panel rounded-card p-5 space-y-4">
                <div class="text-[11px] uppercase tracking-[0.16em] text-slate-400 font-semibold">Что важно в поле</div>
                <div class="space-y-3">
                  <div class="rounded-card bg-white/70 border border-white/60 px-4 py-4">
                    <div class="text-sm font-medium text-slate-800">Guide-ready остановки</div>
                    <div class="text-sm text-slate-600 mt-1">${activeVariant?.guideReadyStopCount || 0} из ${activeVariant?.pointCount || 0} имеют dedicated guide material.</div>
                  </div>
                  <div class="rounded-card bg-white/70 border border-white/60 px-4 py-4">
                    <div class="text-sm font-medium text-slate-800">Fallback остановки</div>
                    <div class="text-sm text-slate-600 mt-1">${activeVariant?.fallbackStopCount || 0} потребуют facts или description вместо отдельного guide text.</div>
                  </div>
                  <div class="rounded-card bg-white/70 border border-white/60 px-4 py-4">
                    <div class="text-sm font-medium text-slate-800">Быстрый совет</div>
                    <div class="text-sm text-slate-600 mt-1">Проверьте fallback-карточки до выхода на маршрут: именно они чаще требуют ручной адаптации под группу.</div>
                  </div>
                </div>
              </section>
            </div>

            <section class="glass-panel rounded-card p-5 space-y-4">
              <div class="flex items-center justify-between gap-3 flex-wrap">
                <div>
                  <div class="text-[11px] uppercase tracking-[0.16em] text-slate-400 font-semibold">Остановки</div>
                  <h3 class="hero-title text-xl text-slate-800 mt-1">Порядок подачи материалов</h3>
                </div>
                <div class="text-xs text-slate-500">${activeVariant?.stops?.length || 0} карточек</div>
              </div>
              <div class="space-y-4" id="guideStopList"></div>
            </section>
          </section>
        `);

        detailSection.querySelector('#guideBack').onclick = async () => {
          state.guide.selectedPackId = '';
          state.guide.selectedVariantRouteId = '';
          await renderGuideWorkspace();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        const variantList = detailSection.querySelector('#guideVariantList');
        selectedPack.variants.forEach((variant) => {
          const isActive = variant.routeId === state.guide.selectedVariantRouteId;
          const card = el(`
            <button type="button" class="text-left rounded-card border ${isActive ? 'border-cyan-300 bg-cyan-50/60' : 'border-white/60 bg-white/55'} p-4 space-y-2 transition-colors">
              <div class="flex items-start justify-between gap-3">
                <div class="min-w-0">
                  <div class="text-sm font-semibold text-slate-800">${escapeHtml(variant.name)}</div>
                  <div class="text-xs text-slate-500 mt-1">${guideVariantRoleLabel(variant.role)} · ${variant.pointCount} остановок · ~${variant.durationMinutes} мин</div>
                </div>
                <span class="text-[11px] font-medium ${isActive ? 'text-cyan-900' : 'text-slate-500'}">${variant.distanceKm || 0} км</span>
              </div>
              <div class="text-sm text-slate-600 leading-relaxed">${escapeHtml(variant.reason || '')}</div>
            </button>
          `);

          card.onclick = async () => {
            state.guide.selectedVariantRouteId = variant.routeId;
            await renderGuideWorkspace();
          };

          variantList.appendChild(card);
        });

        const stopList = detailSection.querySelector('#guideStopList');
        (activeVariant?.stops || []).forEach((stop, index) => {
          stopList.appendChild(renderGuideStopCard(stop, index));
        });

        layout.appendChild(detailSection);
        root.appendChild(layout);

        const mapNode = detailSection.querySelector('#guideMap');
        const mapStatusNode = detailSection.querySelector('#guideMapStatus');
        renderGuidePreviewMap(mapNode, mapStatusNode, activeVariant);
      }

      function route() {
        const hash = location.hash.replace('#','') || '/';
        const token = localStorage.getItem('token');
        if ((hash === '/' || hash === '') && !token) return renderLogin();
        if (hash === '/login') return renderLogin();
        if (hash === '/register') return renderRegister();
        if (hash === '/guide') return renderGuideWorkspace();
        if (hash === '/profile') return renderProfile();
        return renderHome();
      }

      window.addEventListener('online', () => {
        syncQueuedScans();
        triggerQrRender();
      });

      window.addEventListener('hashchange', async () => {
        destroyMapGl();
        destroyGuideMap();
        await stopActiveScanner({ preserveStatus: true });
        state.qr.render = null;
        route();
      });
      (async () => {
        await loadConfig();
        setNavAuth();
        await fetchUser();
        destroyGuideMap();
        route();
      })();
    </script>
  </body>
</html>
